name: Deploy OCI Shop

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-react-shop-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 빌드 환경 파일 생성
        run: |
          if [ -z "${{ secrets.REACT_SHOP_BACKEND_URL }}" ]; then
            echo "REACT_SHOP_BACKEND_URL secret is required."
            exit 1
          fi
          if [ -z "${{ secrets.REACT_SHOP_NEXT_PUBLIC_GOOGLE_CLIENT_ID }}" ]; then
            echo "REACT_SHOP_NEXT_PUBLIC_GOOGLE_CLIENT_ID secret is required."
            exit 1
          fi
          cat <<EOF > .env.production
          BACKEND_URL=${{ secrets.REACT_SHOP_BACKEND_URL }}
          NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.REACT_SHOP_NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
          EOF

      - name: 의존성 설치
        run: npm ci

      - name: 프로덕션 빌드
        run: npm run build

      - name: 배포 산출물 구성
        run: |
          rm -rf deploy
          mkdir -p deploy/.next
          cp -R .next/standalone/. deploy/
          cp -R .next/static deploy/.next/static
          cp -R public deploy/public
          cp ecosystem.config.js deploy/ecosystem.config.js
          rm -f deploy/.env
          rm -f deploy/.env.local

      - name: SSH 에이전트 설정
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.OCI_SSH_KEY }}

      - name: rsync 설치
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: 배포 산출물 업로드
        run: |
          ssh-keyscan -H ${{ secrets.OCI_HOST }} >> ~/.ssh/known_hosts
          rsync -az \
            --rsync-path="sudo rsync" \
            --filter='P .env' \
            --filter='P .env.local' \
            --delete \
            ./deploy/ ${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}:/opt/react-shop/

      - name: PM2 프로세스 재생성
        run: |
          ssh ${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }} "sudo -i bash -lc 'set -e; [ -x \"${{ secrets.OCI_NODE_BIN }}\" ] || { echo OCI_NODE_BIN invalid; exit 127; }; export PATH=\$(dirname \"${{ secrets.OCI_NODE_BIN }}\"):\$PATH; cd /opt/react-shop; [ -f server.js ] || { echo standalone server.js not found; exit 1; }; pm2 delete react-shop >/dev/null 2>&1 || true; pm2 start ecosystem.config.js --update-env'"
